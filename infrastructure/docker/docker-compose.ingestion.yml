# ============================================================================
# Ingestion Stack — Kafka (KRaft, no ZooKeeper) + Kafka UI
# Extends docker-compose.yml. Start AFTER storage.
#   docker compose -f docker-compose.yml -f docker-compose.ingestion.yml up -d
#
# NOTE: YAML anchors are file-scoped; shared anchors are re-declared here.
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-resource-small: &resource-small
  mem_limit: 256m
  mem_reservation: 128m
  cpus: 0.25

x-defaults: &service-defaults
  restart: unless-stopped
  logging: *default-logging

services:
  kafka:
    <<: *service-defaults
    image: apache/kafka:3.7.0
    container_name: kafka
    profiles: ["ingestion", "core", "all"]
    environment:
      # --- KRaft combined broker+controller (single node) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # --- Resource-conscious single-node settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-5L6g3nShT-eMCtK--X86sw}
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - stream-net
      - ops-net
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  kafka-ui:
    <<: [*service-defaults, *resource-small]
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles: ["ingestion", "core", "all"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: space-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-8088}:8080"
    networks:
      - stream-net
      - edge-net

  # ingestion-service is application code (blueprint only — implemented later).
  # Declared here to document its placement, dependencies, and networks.
  # Uncomment and provide a build context/image when implementing Phase 5+.
  #
  # ingestion-service:
  #   <<: [*service-defaults, *resource-small]
  #   build: ../../ingestion
