# ============================================================================
# Processing Stack — Spark (master + worker), Airflow, dbt
# Extends docker-compose.yml. Start AFTER storage (+ ingestion for streaming).
#   docker compose -f docker-compose.yml -f docker-compose.processing.yml up -d
#
# NOTE: YAML anchors are file-scoped; shared anchors are re-declared here.
# Heavy stack — run Spark batch WITHOUT a concurrent Ollama peak.
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-defaults: &service-defaults
  restart: unless-stopped
  logging: *default-logging

services:
  spark-master:
    <<: *service-defaults
    # Custom image = stock Spark + dbt-duckdb (built once, cached). Lets the same
    # container run Bronze->Silver (Spark) AND Silver->Gold (dbt) reproducibly.
    build:
      context: .
      dockerfile: spark-transform.Dockerfile
    image: space-platform/spark-transform:3.5.1
    profiles: ["processing", "core", "all"]
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      # Transformation runtime wiring so exec'd jobs need no extra -e flags and
      # build_spark_session / dbt resolve MinIO + Kafka by service DNS.
      HOME: /tmp
      PYTHONPATH: /opt/spark/work-dir
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      KAFKA_BOOTSTRAP: kafka:9092
      DUCKDB_S3_ENDPOINT: minio:9000
      DBT_PROFILES_DIR: /opt/spark/work-dir/transformation/dbt
      DBT_DUCKDB_PATH: /opt/spark/work-dir/transformation/dbt/space.duckdb
    ports:
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"   # master UI
    volumes:
      - ../configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      # Live code mount (no docker cp) — edits are picked up without rebuilds.
      - ../../transformation:/opt/spark/work-dir/transformation
      - ../../ingestion:/opt/spark/work-dir/ingestion:ro
      # Persist the Ivy jar cache so hadoop-aws / kafka connectors download once.
      - spark-ivy:/tmp/.ivy2
    networks:
      - compute-net
      - data-net
      - stream-net   # reach Kafka (telemetry.satellite.cleaned) for streaming
    # Runs Spark batch + dbt in local[*] mode inside this container; needs more
    # head-room than a bare master (driver.memory 1g from spark-defaults).
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 20s
      timeout: 5s
      retries: 5

  spark-worker:
    <<: *service-defaults
    image: apache/spark:3.5.1
    profiles: ["processing", "core", "all"]
    restart: on-failure:3
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1500m
      SPARK_WORKER_CORES: 2
    ports:
      - "${SPARK_WORKER_UI_PORT:-8081}:8081"   # worker UI
    volumes:
      - spark-work:/opt/spark/work
      - ../configs/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - compute-net
      - data-net
      - stream-net
    mem_limit: 2g
    mem_reservation: 1g
    cpus: 2.0

  airflow:
    <<: *service-defaults
    # Custom image = stock Airflow + docker CLI + ingestion runtime deps, so the
    # scheduler can actually RUN the platform DAGs (see airflow.Dockerfile).
    build:
      context: .
      dockerfile: airflow.Dockerfile
    image: space-platform/airflow:2.9.2
    profiles: ["processing", "core", "all"]
    depends_on:
      postgres:
        condition: service_healthy
    # 'standalone' runs webserver + scheduler in one process (LocalExecutor)
    # to conserve memory on a 16 GB laptop.
    command: ["bash", "-c", "airflow db migrate && airflow standalone"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dairflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
      AIRFLOW__METRICS__STATSD_ON: "false"
      # --- Platform DAG runtime wiring ---
      # Repo mount on PYTHONPATH -> `ingestion` / `transformation` importable.
      # ingestion.config.settings auto-loads the mounted infrastructure/env/.env,
      # so API keys (FIRMS_MAP_KEY, NASA_API_KEY, …) resolve without env_file.
      PYTHONPATH: /opt/airflow/repo
      # Ingestion connectors land Bronze in MinIO (in-process PythonOperator).
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      KAFKA_BOOTSTRAP: kafka:9092
      # Transformation tasks are dispatched into this container via docker exec.
      SPARK_CONTAINER: ${SPARK_CONTAINER:-space-platform-spark-master-1}
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    volumes:
      # DAG definitions (read-only) — these are what appear in the UI at :8082.
      - ../../ingestion/batch/dags:/opt/airflow/dags/ingestion:ro
      - ../../transformation/orchestration/dags:/opt/airflow/dags/transformation:ro
      # Repo code (read-only) so DAGs import the platform packages live.
      - ../../:/opt/airflow/repo:ro
      # Docker socket so the transformation DAG can exec into spark-master.
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow-logs:/opt/airflow/logs
    networks:
      - compute-net
      - data-net
      - ops-net
    mem_limit: 1536m
    mem_reservation: 768m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Airflow standalone runs db migrate + RBAC bootstrap on first boot;
      # give it a grace window before failures count against the retry budget.
      start_period: 120s

  # dbt runs as an ephemeral, on-demand transformation runner (no long-running
  # process). It is typically invoked by Airflow. Profile 'tools' keeps it out
  # of the default 'up'. Provide a project under dbt-project volume.
  dbt:
    <<: *service-defaults
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.latest
    profiles: ["tools"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]   # keep alive for exec-driven runs
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: /usr/app/.dbt
    volumes:
      - dbt-project:/usr/app
    networks:
      - compute-net
      - data-net
    mem_limit: 384m
    mem_reservation: 128m
    cpus: 0.5
