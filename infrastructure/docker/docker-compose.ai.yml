# ============================================================================
# AI/ML Stack — MLflow, Jupyter, Feast, Qdrant, Ollama, Open WebUI
# Extends docker-compose.yml. Start AFTER storage.
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up -d
#
# NOTE: YAML anchors are file-scoped; shared anchors are re-declared here.
# Ollama is the heaviest service — do NOT peak it alongside Spark batch.
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-resource-small: &resource-small
  mem_limit: 512m
  mem_reservation: 256m
  cpus: 0.50

x-defaults: &service-defaults
  restart: unless-stopped
  logging: *default-logging

services:
  mlflow:
    <<: [*service-defaults, *resource-small]
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    profiles: ["ai", "all"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?options=-csearch_path%3Dmlflow
      --artifacts-destination s3://mlflow-artifacts/
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    networks:
      - ai-net
      - data-net
      - ops-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  jupyter:
    <<: *service-defaults
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    profiles: ["ai", "all"]
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - jupyter-work:/home/jovyan/work
    networks:
      - ai-net
      - data-net
      - compute-net
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.0

  qdrant:
    <<: [*service-defaults, *resource-small]
    image: qdrant/qdrant:latest
    container_name: qdrant
    profiles: ["ai", "all"]
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ai-net
      - ops-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  ollama:
    <<: *service-defaults
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ai", "all"]
    restart: on-failure:3
    environment:
      OLLAMA_KEEP_ALIVE: 5m
      OLLAMA_MAX_LOADED_MODELS: 1
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - ai-net
    mem_limit: 4g
    mem_reservation: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 5

  open-webui:
    <<: [*service-defaults, *resource-small]
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    profiles: ["ai", "all"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - ai-net
      - edge-net

  # Feast feature server is application-configured (feature repo). Declared as
  # a blueprint placeholder; enable when the feature repository exists (Phase 5+).
