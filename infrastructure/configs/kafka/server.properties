# ============================================================================
# Kafka (KRaft) configuration notes — Phase 4 Infrastructure Blueprint
#
# The Kafka container is configured primarily via environment variables in
# docker-compose.ingestion.yml (the apache/kafka image expects KAFKA_* vars),
# so a full server.properties file is NOT mounted. This file documents the
# effective single-node KRaft settings for reference and review.
# See docs/infrastructure/05-networking.md (Kafka listener design).
# ============================================================================

# --- KRaft roles (combined broker + controller, single node) ---
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka:9093

# --- Listeners ---
listeners=INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
advertised.listeners=INTERNAL://kafka:9092
listener.security.protocol.map=INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
inter.broker.listener.name=INTERNAL
controller.listener.names=CONTROLLER

# --- Single-node replication (no HA locally) ---
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
default.replication.factor=1
num.partitions=3

# --- Storage ---
log.dirs=/var/lib/kafka/data
log.retention.hours=72

# --- Resource posture (set via KAFKA_HEAP_OPTS in compose) ---
# -Xms256m -Xmx512m
