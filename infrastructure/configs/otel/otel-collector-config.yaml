# ============================================================================
# OpenTelemetry Collector configuration — Phase 4 Infrastructure Blueprint
# Receives OTLP from instrumented services; exposes metrics to Prometheus.
# See docs/infrastructure/07-observability.md
# ============================================================================
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
  memory_limiter:
    check_interval: 5s
    limit_mib: 200
    spike_limit_mib: 50

exporters:
  # Expose collected metrics for Prometheus to scrape on :8889
  prometheus:
    endpoint: 0.0.0.0:8889
  # Log traces to stdout (lightweight; swap for Jaeger/Tempo when added)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
