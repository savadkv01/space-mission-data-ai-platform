# ============================================================================
# Spark defaults — Phase 4 Infrastructure Blueprint
# Mounted read-only into spark-master/spark-worker.
# Resource-conscious defaults for a 16 GB laptop; tune per job.
# MinIO (S3A) + Iceberg wiring for the lakehouse.
# See docs/infrastructure/08-ai-infrastructure.md and 06-storage-design.md
# ============================================================================

# --- Executor / driver sizing (bounded for local) ---------------------------
spark.driver.memory                 1g
spark.executor.memory               1g
spark.executor.cores                2
spark.sql.shuffle.partitions        8

# --- MinIO (S3A) connectivity ----------------------------------------------
spark.hadoop.fs.s3a.endpoint        http://minio:9000
spark.hadoop.fs.s3a.path.style.access  true
spark.hadoop.fs.s3a.impl            org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false
# Credentials are supplied via environment (AWS_ACCESS_KEY_ID / SECRET) or
# spark-submit --conf at runtime; do not hard-code secrets here.

# --- Iceberg catalog (REST, backed by PostgreSQL + MinIO warehouse) --------
spark.sql.extensions                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.lakehouse         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type    rest
spark.sql.catalog.lakehouse.uri     http://iceberg-rest:8181
spark.sql.catalog.lakehouse.warehouse  s3://warehouse/
spark.sql.catalog.lakehouse.io-impl org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse.s3.endpoint  http://minio:9000

# --- Eventing / UI ----------------------------------------------------------
spark.ui.reverseProxy               false
spark.eventLog.enabled              false
