# dbt connection profile for the serving layer (Task 4). DuckDB is in-process and
# reads Gold Parquet directly from MinIO, so no serving database server is needed
# on the 16 GB laptop target. Copy to ~/.dbt/profiles.yml or set DBT_PROFILES_DIR
# to this folder. No secrets are stored here.
space_serving:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('SERVING_DUCKDB_PATH', 'serving/dbt/serving.duckdb') }}"
      threads: 4
      extensions:
        - httpfs
        - parquet
      # MinIO (S3A) read access for Gold Parquet. Endpoint/creds come from the
      # environment so no secrets live in this file; defaults target local infra.
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_endpoint: "{{ env_var('DUCKDB_S3_ENDPOINT', 'minio:9000') }}"
        s3_access_key_id: "{{ env_var('MINIO_ROOT_USER', 'platform_minio') }}"
        s3_secret_access_key: "{{ env_var('MINIO_ROOT_PASSWORD', '') }}"
        s3_use_ssl: false
        s3_url_style: "path"
    # Production target placeholder — point at the lakehouse SQL engine (Trino).
    prod:
      type: duckdb
      path: "{{ env_var('SERVING_DUCKDB_PATH', 'serving/dbt/serving.duckdb') }}"
      threads: 4
